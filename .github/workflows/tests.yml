name: tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: Run the live monkeytype.com smoke test
        required: false
        default: false
        type: boolean

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run full test suite
        run: pytest -v --tb=short

      - name: Run live MonkeyType smoke test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_smoke }}
        run: AUTOMONKEYTYPE_RUN_LIVE=1 pytest -v --tb=short tests/test_live_smoke.py
